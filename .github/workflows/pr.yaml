name: pr

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which files changed so we can skip expensive jobs for docs-only PRs.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          predicate-quantifier: every
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!docs/**'

  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run basic checks
        uses: ./.github/actions/basic-checks

      - name: Verify platform matrix is in sync
        run: python3 scripts/generate-platform-docs.py --check

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Build CLI TypeScript modules
        run: npm run build:cli

      - name: Run unit tests with coverage
        run: npm test -- --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  sandbox-images-and-e2e:
    needs: [checks, unit-tests, changes]
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/sandbox-images-and-e2e.yaml
    with:
      run_arm64: true